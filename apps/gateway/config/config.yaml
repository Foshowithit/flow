  #     mode: chat
  #     supports_function_calling: true

  # ═══════════════════════════════════════════════════════════════
  # NEAR-TERM LANE: SELF-HOSTED vLLM
  # ═══════════════════════════════════════════════════════════════

  # Uncomment when self-hosted capacity is deployed.
