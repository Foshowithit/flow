# Flow Gateway — LiteLLM Proxy Configuration
#
# This file defines the model registry, upstream provider mappings,
# routing behaviour, and general server settings.
#
# Environment variables are substituted at runtime by LiteLLM.
#
# Upstream strategy:
#   Primary working:   Fireworks AI + DeepInfra
#   Tertiary/bench:    Makora (sold-out risk, fallback only)
#   Disabled (topped up): DeepSeek direct, OpenRouter
#   Near-term lane:    Self-hosted vLLM
#   See docs/service-strategy.md for details.

model_list:
  # ═══════════════════════════════════════════════════════════════
  # PRIMARY WORKING UPSTREAMS
  # ═══════════════════════════════════════════════════════════════

  # ── Fireworks AI (primary for Flash-class models) ────────────
  - model_name: flow/deepseek-v4-flash
    litellm_params:
      model: openai/accounts/fireworks/models/deepseek-v4-flash
      api_base: https://api.fireworks.ai/inference/v1
      api_key: os.environ/FIREWORKS_API_KEY
      rpm: 1000
    model_info:
      mode: chat
      supports_function_calling: true

  # ── DeepInfra (primary for Llama / first fallback for Flash) ─
  - model_name: flow/deepseek-v4-flash-deepinfra
    litellm_params:
      model: openai/deepseek-ai/DeepSeek-V4-Flash
      api_base: https://api.deepinfra.com/v1/openai
      api_key: os.environ/DEEPINFRA_API_KEY
      rpm: 500
    model_info:
      mode: chat
      supports_function_calling: true

  - model_name: flow/deepinfra-default
    litellm_params:
      model: openai/meta-llama/Llama-3.3-70B-Instruct-Turbo
      api_base: https://api.deepinfra.com/v1/openai
      api_key: os.environ/DEEPINFRA_API_KEY
      rpm: 200
    model_info:
      mode: chat
      supports_function_calling: true

  # ═══════════════════════════════════════════════════════════════
  # TERTIARY / BENCHMARK
  # ═══════════════════════════════════════════════════════════════

  # ── Makora (tertiary fallback / benchmark target) ────────────
  # ⚠ Sold-out risk — do not rely on for production traffic.
  - model_name: flow/deepseek-v4-flash-makora
    litellm_params:
      model: openai/makora-default
      api_base: https://inference.makora.com/v1
      api_key: os.environ/MAKORA_API_KEY
      rpm: 100
    model_info:
      mode: chat
      supports_function_calling: true
      description: "Makora tertiary fallback — sold-out risk"

  - model_name: flow/makora-default
    litellm_params:
      model: openai/makora-default
      api_base: https://inference.makora.com/v1
      api_key: os.environ/MAKORA_API_KEY
      rpm: 100
    model_info:
      mode: chat
      supports_function_calling: true
      description: "Makora benchmark — sold-out risk"

  # ═══════════════════════════════════════════════════════════════
  # DISABLED UNTIL TOPPED UP (kept commented for reference)
  # ═══════════════════════════════════════════════════════════════

  # ── DeepSeek direct (disabled — no credit) ──────────────────
  # - model_name: flow/deepseek-v4-flash
  #   litellm_params:
  #     model: openai/deepseek-chat
  #     api_base: https://api.deepseek.com/v1
  #     api_key: os.environ/DEEPSEEK_API_KEY
  #     rpm: 500
  #   model_info:
  #     mode: chat
  #     supports_function_calling: true

  # - model_name: flow/deepseek-v4-pro
  #   litellm_params:
  #     model: openai/deepseek-reasoner
  #     api_base: https://api.deepseek.com/v1
  #     api_key: os.environ/DEEPSEEK_API_KEY
  #     rpm: 500
  #   model_info:
  #     mode: chat
  #     supports_function_calling: true

  # ── OpenRouter (disabled — no credit) ──────────────────────
  # - model_name: flow/llama-3.3-70b
  #   litellm_params:
  #     model: openai/meta-llama/llama-3.3-70b-instruct
  #     api_base: https://openrouter.ai/api/v1
  #     api_key: os.environ/OPENROUTER_API_KEY
