router_settings:
  routing_strategy: "usage-based"
  allowed_fails: 3
  num_retries: 2
  retry_after: 5
  fallbacks:
    # flow/deepseek-v4-flash (Fireworks) → DeepInfra → Makora
    - flow/deepseek-v4-flash:
        [flow/deepseek-v4-flash-deepinfra, flow/deepseek-v4-flash-makora]
    # DeepInfra general → Makora
    - flow/deepinfra-default: [flow/makora-default]
  cooldown_time: 30
  enable_pre_call_checks: true

general_settings:
  master_key: os.environ/FLOW_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  otel: false
  max_request_size_mb: 100
  # ssl_cert_path: /app/certs/cert.pem       # future
  allowed_routes:
    - /health
    - /v1/models
    - /v1/chat/completions
    - /v1/completions
    - /v1/embeddings
