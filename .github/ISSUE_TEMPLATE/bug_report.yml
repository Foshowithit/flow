name: Bug report
description: Report a problem with Flow
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Include logs or screenshots without secrets.
