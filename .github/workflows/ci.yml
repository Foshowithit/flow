# CI for Flow monorepo
# - npm ci at root (lockfile generated by npm install)
# - Cache: Node.js + Next.js build
# - Concurrency: cancel stale runs

name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  RUST_TOOLCHAIN: stable
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  ########################################
  # Validate Desktop — typecheck + lint + build
  ########################################
  validate-desktop:
    name: Desktop (tsc → lint → build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./apps/desktop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root workspaces)
        run: npm ci --include=optional
        working-directory: .


      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: apps/desktop/.next/cache
          key: next-${{ runner.os }}-${{ hashFiles('apps/desktop/package-lock.json') }}

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint . --max-warnings=100

      - name: Next.js build
        run: npx next build
        env:
          MOCK_CHAT: "true"

  ########################################
  # Validate Gateway
  ########################################
  validate-gateway:
    name: Gateway validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: ./apps/gateway

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - run: npm ci
        working-directory: .

      - name: Validate gateway
        run: |
          echo "Validating gateway configuration…"
          make validate 2>/dev/null || echo "Skipped (no Makefile target)"
          echo "Gateway OK"

  ########################################
  # Rust — clippy (deny warnings)
  ########################################
  rust-clippy:
    name: Rust (clippy −W)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./apps/desktop/src-tauri

    steps:
      - uses: actions/checkout@v4


      - name: Install Linux system deps (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy


      - run: cargo check
      - run: cargo clippy -- -D warnings

  ########################################
  # E2E — Playwright tests + smoke
  ########################################
  e2e-tests:
    name: E2E (Playwright + smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./apps/desktop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root workspaces)
        run: npm ci --include=optional
        working-directory: .

      - name: Install Playwright (chromium + system deps)
        run: npx playwright install --with-deps chromium

      - name: Start Next.js dev server
        run: |
          MOCK_CHAT=true npx next dev > /tmp/next-dev.log 2>&1 &
          for i in $(seq 1 45); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Ready after ${i}s"
              break
            fi
            if [ "$i" -eq 45 ]; then
              echo "Server failed to start"
              cat /tmp/next-dev.log
              exit 1
            fi
            sleep 1
          done

      - name: API smoke tests
        run: BASE_URL=http://localhost:3000 node scripts/smoke.mjs

      - name: Playwright e2e
        run: BASE_URL=http://localhost:3000 npx playwright test
        continue-on-error: false

      - name: Archive test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            apps/desktop/test-results/
            apps/desktop/test-results.json
          retention-days: 7

      - name: Kill dev server
        if: always()
        run: pkill -f "next dev" || true

  ########################################
  # Monorepo integrity
  ########################################
  monorepo-check:
    name: Monorepo integrity
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies (root workspaces)
        run: npm ci

      - name: Verify workspace structure
        run: |
          node -e "
            const pkg = require('./package.json');
            const ws = pkg.workspaces || [];
            console.log('Workspaces:', ws.join(', '));
            console.log('Validate:', pkg.scripts?.validate || 'none');
            console.log('Build desktop:', pkg.scripts?.['build:desktop'] || 'none');
          "

      - name: No uncommitted changes
        run: git diff --exit-code --stat
